<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 148" width="772" height="148">
  <defs>
    <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="green-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-shadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0097a7" flood-opacity="0.35"/>
    </filter>

    <pattern id="circuit" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 H6 M14 10 H20 M10 0 V6 M10 14 V20" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
      <circle cx="10" cy="10" r="1.2" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
      <circle cx="0" cy="0" r="0.7" fill="#00e5ff" opacity="0.18"/>
      <circle cx="20" cy="0" r="0.7" fill="#00e5ff" opacity="0.18"/>
      <circle cx="0" cy="20" r="0.7" fill="#00e5ff" opacity="0.18"/>
      <circle cx="20" cy="20" r="0.7" fill="#00e5ff" opacity="0.18"/>
    </pattern>

    <linearGradient id="divider-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00bcd4" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#00bcd4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="hex-face" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0f2d3f"/>
      <stop offset="100%" stop-color="#071a27"/>
    </radialGradient>

    <linearGradient id="core-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>

    <linearGradient id="termux-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e3b"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>

    <linearGradient id="tag-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0097a7"/>
      <stop offset="60%" stop-color="#00796b"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>

    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════ HEXAGON LOGO ══════════════════════ -->

  <polygon points="80,12 126,37 126,87 80,112 34,87 34,37"
    fill="#00bcd4" opacity="0.07"/>
  <polygon points="80,14 124,38 124,86 80,110 36,86 36,38"
    fill="url(#hex-face)"/>
  <polygon points="80,14 124,38 124,86 80,110 36,86 36,38"
    fill="url(#circuit)" opacity="1"/>
  <polygon points="80,14 124,38 124,86 80,110 36,86 36,38"
    fill="none" stroke="#00e5ff" stroke-width="3"
    filter="url(#cyan-glow)" opacity="0.9"/>
  <polygon points="80,21 117,41 117,83 80,103 43,83 43,41"
    fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>

  <circle cx="80"  cy="14"  r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>
  <circle cx="124" cy="38"  r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>
  <circle cx="124" cy="86"  r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>
  <circle cx="80"  cy="110" r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>
  <circle cx="36"  cy="86"  r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>
  <circle cx="36"  cy="38"  r="2.5" fill="#00e5ff" opacity="0.75" filter="url(#cyan-glow)"/>

  <g opacity="0.4" stroke="#00e5ff" stroke-width="0.8" fill="none">
    <line x1="80" y1="14" x2="80" y2="30"/>
    <circle cx="80" cy="30" r="2" fill="#00e5ff"/>
    <line x1="80" y1="110" x2="80" y2="94"/>
    <circle cx="80" cy="94" r="2" fill="#00e5ff"/>
    <line x1="36" y1="62" x2="50" y2="62"/>
    <circle cx="50" cy="62" r="2" fill="#00e5ff"/>
    <line x1="124" y1="62" x2="110" y2="62"/>
    <circle cx="110" cy="62" r="2" fill="#00e5ff"/>
  </g>

  <g fill="none" stroke="#39ff14" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"
     filter="url(#green-glow)">
    <polyline points="64,50 50,62 64,74"/>
    <line x1="84" y1="49" x2="76" y2="75"/>
    <polyline points="96,50 110,62 96,74"/>
  </g>

  <!-- ══════════════════════ DIVIDER ══════════════════════ -->
  <rect x="154" y="18" width="1.5" height="112" fill="url(#divider-grad)"/>

  <!-- ══════════════════════ TEXT BLOCK ══════════════════════ -->
  <text x="190" y="72"
    font-family="'Trebuchet MS', 'Arial Narrow', Arial, sans-serif"
    font-size="58" font-weight="900" letter-spacing="5"
    fill="url(#core-grad)"
    filter="url(#text-shadow)">JIN</text>

  <text x="360" y="70"
    font-family="'Trebuchet MS', sans-serif"
    font-size="34" font-weight="300"
    fill="#8baabb" opacity="0.7"> – </text>

  <text x="385" y="72"
    font-family="'Trebuchet MS', 'Arial Narrow', Arial, sans-serif"
    font-size="58" font-weight="900" letter-spacing="5"
    fill="url(#termux-grad)">TERMX</text>

  <!-- Accent underline -->
  <rect x="190" y="80" width="530" height="1.5" fill="url(#line-grad)"/>

  <!-- Tagline -->
  <text x="180" y="104"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5" letter-spacing="2.8"
    fill="url(#tag-grad)">Modular framework · Dev environments · Termux Android</text>

  <circle cx="173" cy="100" r="2.2" fill="#39ff14" opacity="0.75" filter="url(#green-glow)"/>

  <!-- Corner brackets -->
  <g stroke="#00bcd4" stroke-width="1.2" fill="none" opacity="0.45">
    <polyline points="748,6 766,6 766,24"/>
    <polyline points="6,124 6,142 24,142"/>
    <polyline points="24,6 6,6 6,24"/>
    <polyline points="748,142 766,142 766,124"/>
  </g>
</svg>